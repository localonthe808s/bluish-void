<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bluish Void — Mobile Preview Gallery</title>
<style>
  body {
    margin: 0;
    padding: 18px;
    background: #1a1d2c;
    color: #ddd;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }
  h1 {
    margin: 0 0 6px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: #fff;
  }
  .legend {
    margin: 0 0 18px;
    font-size: 12px;
    color: rgba(255,255,255,.55);
    line-height: 1.5;
  }
  .legend code {
    background: rgba(255,255,255,.06);
    padding: 2px 6px;
    border-radius: 4px;
    color: #ffe080;
  }
  .gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 22px;
    align-items: flex-start;
  }
  .frame-wrap {
    background: #000;
    border-radius: 26px;
    padding: 10px 6px 14px;
    box-shadow: 0 12px 36px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.08);
    position: relative;
    flex: 0 0 auto;
  }
  .frame-label {
    text-align: center;
    color: rgba(255,255,255,.7);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin: 0 0 8px;
  }
  .frame-label .px {
    color: rgba(255,255,255,.45);
    font-weight: 500;
    margin-left: 6px;
    text-transform: none;
    letter-spacing: 0.02em;
  }
  iframe {
    display: block;
    border: 0;
    border-radius: 18px;
    background: #1a1d2c;
  }
  .controls {
    margin: 0 0 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .controls button {
    background: rgba(255,255,255,.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.04em;
  }
  .controls button:hover {
    background: rgba(255,255,255,.14);
  }
  .controls input[type="number"] {
    background: rgba(255,255,255,.06);
    color: #fff;
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 8px;
    padding: 6px 8px;
    font-size: 12px;
    width: 70px;
    font-family: inherit;
  }
  .controls label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: rgba(255,255,255,.65);
  }
</style>
</head>
<body>
  <h1>Bluish Void · Mobile Preview Gallery</h1>
  <p class="legend">
    Each frame loads <code>./index.html</code> at a fixed viewport width. Use these to compare layout
    across common phone + small-tablet sizes side-by-side. Heights default to 1000px so you can
    scroll inside each frame independently.
  </p>

  <div class="controls">
    <label>Frame height <input type="number" id="frameHeight" value="1000" min="400" max="3000" step="50"></label>
    <button onclick="reloadAll()">Reload all</button>
    <button onclick="syncScroll()">Sync scroll positions</button>
  </div>

  <div class="gallery" id="gallery"></div>

  <script>
    // Common mobile viewport widths to render at.
    var widths = [
      { w: 320, label: 'iPhone SE',         hint: '320px · oldest small phone' },
      { w: 360, label: 'Galaxy / small Android', hint: '360px' },
      { w: 375, label: 'iPhone 14',         hint: '375px · the typical iPhone' },
      { w: 414, label: 'iPhone Pro Max',    hint: '414px · large iPhone' },
      { w: 480, label: 'Phablet edge',      hint: '480px · last small breakpoint' },
      { w: 600, label: 'Small tablet',      hint: '600px' },
      { w: 768, label: 'iPad portrait',     hint: '768px · mobile breakpoint cutoff' }
    ];

    var gallery = document.getElementById('gallery');
    var heightInput = document.getElementById('frameHeight');

    function build() {
      var h = parseInt(heightInput.value, 10) || 1000;
      gallery.innerHTML = '';
      widths.forEach(function(item) {
        var wrap = document.createElement('div');
        wrap.className = 'frame-wrap';
        wrap.style.width = (item.w + 14) + 'px';
        wrap.innerHTML =
          '<div class="frame-label">' + item.label +
          '<span class="px">' + item.hint + '</span></div>' +
          '<iframe src="./index.html" style="width:' + item.w + 'px;height:' + h + 'px;"></iframe>';
        gallery.appendChild(wrap);
      });
    }

    function reloadAll() {
      document.querySelectorAll('iframe').forEach(function(f){
        f.src = f.src;
      });
    }

    function syncScroll() {
      // Scroll all frames to top
      document.querySelectorAll('iframe').forEach(function(f){
        try { f.contentWindow.scrollTo(0, 0); } catch(e) {}
      });
    }

    heightInput.addEventListener('change', build);
    build();
  </script>
</body>
</html>
