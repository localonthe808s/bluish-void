<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Permissions-Policy" content="encrypted-media=*, autoplay=*, fullscreen=*">
<title>BLUISH | VOID</title>

<!-- preconnect to external origins so DNS/TCP/TLS handshakes start asap -->
<link rel="preconnect" href="https://w.soundcloud.com">
<link rel="preconnect" href="https://soundcloud.com">
<link rel="preconnect" href="https://i1.sndcdn.com" crossorigin>
<link rel="preconnect" href="https://bandcamp.com">
<link rel="preconnect" href="https://bandcamp4.com">
<link rel="preload" href="https://cdn.bluishvoid.com/qellia.woff2?v=1" as="font" type="font/woff2" crossorigin>
<style>
@font-face {
    font-family: "QelliaRegular";
    /* Hosted on R2 — same asset as the main page (uploaded once, reused here). */
    src: url('https://cdn.bluishvoid.com/qellia.woff2?v=1') format('woff2');
    font-display: swap;
  }

  :root {
    /* bluishvoid theme — matches dashboard */
    --bluish:        #2B22F4;
    --ink:           #2B22F4;
    --ink-dim:       rgba(43,34,244,0.68);
    --ink-soft:      rgba(43,34,244,0.42);
    --paper:         #ffffff;
    --paper-strong:  rgba(0,0,0,0.04);          /* used for hover/current accents on white */
    --paper-soft:    rgba(255,255,255,0.32);
    --paper-solid:   #ffffff;
    --glow:
      0 0 100px rgba(43,34,244,0.05),
      0 14px 60px rgba(15,23,42,0.18);
    --fog-blur:      blur(26px) saturate(120%);

    /* Fluid sizing scale — keeps pill proportional across laptops + desktops */
    --btn-size:    clamp(36px, 3.2vw, 48px);
    --icon-size:   clamp(16px, 1.6vw, 22px);
    --strip-h:     44px;       /* fixed: matches Bandcamp's natural content height */
    --art-size:    44px;
    --title-size:  clamp(11px, 1.05vw, 14px);
    --bc-width:    clamp(380px, 40vw, 640px);
    --pill-pad:    clamp(6px, 0.7vw, 10px);
    --pill-gap:    clamp(6px, 0.7vw, 10px);
    --pill-radius: clamp(22px, 2.5vw, 32px);
  }
  @supports not (backdrop-filter: blur(20px)) {
    :root { --paper: var(--paper-solid); --paper-strong: var(--paper-solid); }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0;
    height: 100%; height: 100dvh;
    overflow: hidden; overscroll-behavior: none;
    scrollbar-width: none; -ms-overflow-style: none;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: transparent;
  }
  html::-webkit-scrollbar, body::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* BACK TO REALITY peer-page nav — holy cloud, matches /index VOID nav */
  #bluishvoid-nav {
    position: fixed;
    left: 50%;
    bottom: calc(16px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 9999;
    font-family: 'QelliaRegular', 'Bodoni Moda', Georgia, serif;
    font-size: clamp(13px, 2.2vw, 18px);
    letter-spacing: 0.28em; text-transform: uppercase;
    font-weight: 400;
    max-width: calc(100vw - 32px);
    text-align: center;
  }
  #bluishvoid-nav a {
    position: relative; display: inline-block;
    color: rgba(43, 34, 244, 0.95);
    text-decoration: none;
    padding: 16px 30px 18px;
    background: transparent;
    border: none;
    text-shadow:
      0 0 8px rgba(255, 255, 255, 0.95),
      0 0 16px rgba(255, 250, 220, 0.7),
      0 0 28px rgba(255, 245, 200, 0.45),
      0 1px 0 rgba(255, 255, 255, 0.5);
    transition: transform .35s ease;
    z-index: 1;
  }
  #bluishvoid-nav a::before {
    content: '';
    position: absolute;
    inset: -130% -15%;
    background:
      radial-gradient(ellipse 60% 55% at 50% 50%,
        rgba(255, 255, 255, 1) 0%,
        rgba(255, 250, 235, 0.92) 22%,
        rgba(252, 245, 215, 0.7) 42%,
        rgba(255, 240, 195, 0.4) 62%,
        rgba(255, 235, 180, 0.18) 80%,
        rgba(255, 230, 170, 0) 100%);
    filter: blur(24px);
    z-index: -1;
    pointer-events: none;
    animation: void-glow 6s ease-in-out infinite;
  }
  #bluishvoid-nav a:hover { transform: translateY(-1px) scale(1.04); }
  #bluishvoid-nav a:hover::before {
    background:
      radial-gradient(ellipse 65% 60% at 50% 50%,
        rgba(255, 255, 255, 1) 0%,
        rgba(255, 250, 235, 1) 22%,
        rgba(252, 245, 215, 0.82) 42%,
        rgba(255, 240, 195, 0.52) 62%,
        rgba(255, 235, 180, 0.26) 80%,
        rgba(255, 230, 170, 0) 100%);
  }
  @keyframes void-glow {
    0%, 100% { opacity: 0.95; transform: scale(1);    filter: blur(24px); }
    50%      { opacity: 1;    transform: scale(1.07); filter: blur(30px); }
  }
  @media (prefers-reduced-motion: reduce) {
    #bluishvoid-nav a::before { animation: none; }
  }

  .pill {
    position: fixed;
    left: 50%;
    bottom: calc(100px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 9999;
    width: auto;
    max-width: calc(100vw - 24px);
    padding: var(--pill-pad);
    display: flex; align-items: center; gap: var(--pill-gap);
    background: var(--paper);
    backdrop-filter: var(--fog-blur); -webkit-backdrop-filter: var(--fog-blur);
    border: none;
    border-radius: var(--pill-radius);
  }
  .btn {
    background: transparent; border: 0; cursor: pointer; padding: 0;
    width: var(--btn-size); height: var(--btn-size); border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: color .15s, transform .15s, background .15s;
    color: var(--ink-dim);
    flex-shrink: 0;
  }
  .btn:hover { color: var(--ink); background: var(--paper-strong); }
  .btn svg { display: block; fill: currentColor; width: var(--icon-size); height: var(--icon-size); }

  .queue {
    position: fixed; left: 50%; bottom: calc(172px + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(20px);
    z-index: 19;
    width: 520px; max-width: calc(100vw - 32px); max-height: 50vh; max-height: 50dvh;
    background: var(--paper);
    backdrop-filter: var(--fog-blur); -webkit-backdrop-filter: var(--fog-blur);
    border: none;
    border-radius: 22px;
    box-shadow: var(--glow);
    overflow-y: auto; overflow-x: hidden;
    opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
  }
  .queue.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  .queue-row {
    display: grid;
    grid-template-columns: 12px 1fr;
    align-items: center; gap: 12px;
    padding: 10px 18px;
    cursor: pointer;
    transition: background .15s, color .15s;
    color: var(--ink-dim);
  }
  .queue-row:hover { background: var(--paper-strong); color: var(--ink); }
  .queue-row.current { background: var(--paper-strong); color: var(--ink); }
  .platform-dot { width: 6px; height: 6px; border-radius: 50%; }
  .platform-dot.soundcloud { background: #ff5500; }
  .platform-dot.bandcamp   { background: #629aa9; }
  .queue-text {
    font-size: 12px; color: inherit; font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .queue-text .sep { color: var(--ink-soft); margin: 0 6px; }

  /* audio iframe — hidden offscreen for SC (with real dimensions so canvas works),
     visible inline for BC */
  #audioFrame {
    width: 320px; height: 200px; opacity: 0; pointer-events: none;
    border: 0;
    position: absolute; top: 0; left: -10000px;
  }
  .pill[data-platform="bandcamp"] #audioFrame {
    position: static;
    flex: 0 0 var(--bc-width); width: var(--bc-width); height: var(--strip-h);
    opacity: 1; pointer-events: auto;
    /* trim BC's bottom underline + side perimeter */
    clip-path: inset(1px 2px 4px 2px round 4px);
    -webkit-clip-path: inset(1px 2px 4px 2px round 4px);
  }
  @media (max-width: 720px) {
    .pill[data-platform="bandcamp"] #audioFrame {
      flex: 1 1 auto; width: auto; min-width: 240px;
    }
  }

  /* Custom SoundCloud strip — mirrors Bandcamp's slim layout */
  .sc-strip {
    display: none;
    flex: 0 1 auto; min-width: 0;
    align-items: stretch;
    height: var(--strip-h);
  }
  .pill[data-platform="soundcloud"] .sc-strip,
  .pill[data-platform="empty"] .sc-strip { display: flex; }
  .pill[data-platform="empty"] .sc-art,
  .pill[data-platform="empty"] .sc-play,
  .pill[data-platform="empty"] .sc-logo { display: none; }
  .pill[data-platform="empty"] .sc-info { padding: 0 16px; flex: 1 1 auto; min-width: 220px; }
  .pill[data-platform="empty"] .sc-title { color: var(--ink); font-style: italic; font-size: 12px; }
  .sc-art {
    width: var(--art-size); height: var(--art-size); flex-shrink: 0;
    background-color: rgba(255,255,255,0.4);
    background-size: cover; background-position: center;
    border-radius: 4px 0 0 4px;
  }
  /* hairline separators around the play button — mirrors BC's strip */
  .sc-play {
    width: var(--art-size); height: var(--art-size); flex-shrink: 0;
    border: 0;
    border-left: 1px solid rgba(0,0,0,0.08);
    border-right: 1px solid rgba(0,0,0,0.08);
    background: transparent; color: #000;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: var(--icon-size); line-height: 1;
    padding: 0; margin: 0;
    transition: background .15s, color .15s;
  }
  /* SoundCloud brand mark — official cloud + waveform icon */
  .sc-logo {
    flex-shrink: 0;
    align-self: center;
    margin: 0 12px 0 8px;
    display: flex; align-items: center;
  }
  .sc-logo svg { display: block; }
  .sc-play:hover { background: rgba(0,0,0,0.04); color: var(--bluish); }
  .sc-info {
    flex: 0 1 auto; min-width: 0;
    display: flex; align-items: center;
    padding: 0 14px;
  }
  .sc-title {
    font-size: var(--title-size); color: #000; font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    width: max-content; max-width: 100%;
  }
  .sc-title a {
    color: var(--bluish); text-decoration: none; font-weight: 500;
  }
  .sc-title a:hover { text-decoration: underline; }

  /* Loading state — pulses the strip while a track is fetching/loading */
  @keyframes bv-pulse {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 0.95; }
  }
  .pill.loading .sc-art {
    animation: bv-pulse 1.1s ease-in-out infinite;
    background-color: rgba(43,34,244,0.10);
  }
  .pill.loading .sc-title { color: var(--ink-soft); font-style: italic; }
  .pill.loading .sc-title::before { content: "loading… "; }


  @media (max-width: 600px) {
    .pill {
      min-width: 0; width: calc(100vw - 16px);
      padding: 4px; gap: 4px;
      bottom: calc(122px + env(safe-area-inset-bottom));
    }
    /* Tighter chrome so the SC title gets more horizontal room */
    .pill .btn { width: 34px; height: 34px; }
    .pill .btn svg { width: 16px; height: 16px; }
    .sc-art { width: 36px; height: 36px; }
    .sc-play { width: 36px; height: 36px; font-size: 14px; }
    .sc-info { padding: 0 8px; }
    .sc-logo { display: none; }       /* hide brand mark on phones */
    .progress { display: none; }
    .queue {
      width: calc(100vw - 16px);
      bottom: calc(194px + env(safe-area-inset-bottom));
    }
    #bluishvoid-nav {
      bottom: calc(30px + env(safe-area-inset-bottom));
    }
  }

  .bg-video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .bg-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    background: transparent;
    border: 0;
    padding: 28px 14px;
    cursor: pointer;
    color: #fff;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
  }
  .bg-nav-prev { left: 4px; }
  .bg-nav-next { right: 4px; }
  body.bg-nav-visible .bg-nav { opacity: 0.35; pointer-events: auto; }
  .bg-nav:hover { opacity: 1 !important; }
  .bg-nav svg { display: block; }
</style>
</head>

      </svg>

  </div>

  <!-- Bandcamp iframe (visible only on BC tracks) -->
  <iframe id="audioFrame"
    allow="autoplay 'src' *; encrypted-media 'src' *; fullscreen *"

  <button class="btn btn-list" id="btnList" aria-label="Open queue list">

<script>
// pick one wave color per page load
const WAVE_COLORS = ['#f97316', '#ffffff', '#4ade80', '#2B22F4'];
document.documentElement.style.setProperty('--wave-color',
  WAVE_COLORS[Math.floor(Math.random() * WAVE_COLORS.length)]);

// ─── Live Tumblr fetch ───────────────────────────────────────────────────
// Pulls latest audio posts from bluish-void.tumblr.com. Read-only consumer key.
// Cached in localStorage for 10 minutes per the brief's rate-limit budget.
const TUMBLR_BLOG = 'bluish-void.tumblr.com';
const TUMBLR_API_KEY = '9b4opSvN6FrKK7sUtoLMjtGtQ4ZB1SZsr9sOYAKmKm6LhvimQq';
const TUMBLR_CACHE_KEY = 'bv_tumblr_cache_v6';
const TUMBLR_CACHE_TTL_MS = 10 * 60 * 1000;
// Only show posts from this moment forward. Edit if you want a different cutoff.
const TUMBLR_CUTOFF = new Date('2026-05-09T00:00:00Z');

function parseTumblrPost(post) {
  // Drop anything posted before the cutoff
  const postDate = new Date(post.date);
  if (isNaN(postDate.getTime()) || postDate < TUMBLR_CUTOFF) return null;

  // Pull HTML from any field Tumblr puts content in
  const html = [
    post.caption,
    post.body,
    post.player && Array.isArray(post.player)
      ? post.player.map(p => p && p.embed_code).join(' ')
      : (post.player && post.player.embed_code) || '',
    post.embed_html,
    post.audio_source_url ? `<iframe src="${post.audio_source_url}"></iframe>` : ''
  ].filter(Boolean).join(' ');
  if (!html) return null;

  const embeds = [];

  // SoundCloud iframe — match w.soundcloud.com/player URLs
  const scRe = /w\.soundcloud\.com\/player\/?[^"'\s]*url=([^&"'\s]+)/g;
  let scM;
  while ((scM = scRe.exec(html)) !== null) {
    const target = decodeURIComponent(scM[1]);
    if (/api\.soundcloud\.com\/tracks\/(\d+)/.test(target)) {
      const id = target.match(/api\.soundcloud\.com\/tracks\/(\d+)/)[1];
      embeds.push({ platform: 'soundcloud', ref_type: 'track_id', ref: id });
    } else if (/soundcloud\.com\/([^?#]+)/.test(target)) {
      const slug = target.match(/soundcloud\.com\/([^?#]+)/)[1].replace(/\/$/, '');
      embeds.push({ platform: 'soundcloud', ref_type: 'user_slug', ref: slug });
    }
  }

  // Bandcamp iframe
  const bcRe = /bandcamp\.com\/EmbeddedPlayer\/(?:[^"'\s]*?)(album|track)=(\d+)/g;
  let bcM;
  while ((bcM = bcRe.exec(html)) !== null) {
    embeds.push({ platform: 'bandcamp', ref_type: bcM[1], ref: bcM[2] });
  }

  // Filter to audio only (drop yt/vimeo if anything else slipped in via this regex set; we don't add them).
  if (!embeds.length) return null;

  // Extract <a> tags as caption_links
  const links = [];
  const linkRe = /<a[^>]+href="([^"]+)"[^>]*>([^<]*)<\/a>/g;
  let lm;
  while ((lm = linkRe.exec(html)) !== null) {
    const label = lm[2].replace(/<[^>]+>/g, '').trim();
    if (label) links.push({ label, url: lm[1] });
  }

  // Build a display title from Tumblr's own metadata (better than guessing from <a> labels)
  const displayTitle = (
    (post.track_name && post.artist ? `${post.track_name} by ${post.artist}` : '') ||
    post.track_name ||
    post.artist ||
    post.summary ||
    ''
  ).trim();

  return {
    id: String(post.id),
    date: post.date ? post.date.replace(' GMT', '').replace(' ', 'T') : '',
    title: displayTitle,
    embeds,
    caption_links: links.slice(0, 4)
  };
}

async function fetchLiveTumblrPosts() {
  // Cache check
  try {
    const cached = JSON.parse(localStorage.getItem(TUMBLR_CACHE_KEY) || 'null');
    if (cached && (Date.now() - cached.fetchedAt < TUMBLR_CACHE_TTL_MS)) {
      return cached.posts;
    }
  } catch (e) {}

  // Paginate /posts/audio so we get every audio post on the blog, not just the
  // latest 50 of any post type (where audio could be sparse). All pages fan out
  // in parallel — the prior sequential await-loop served the same pages but
  // serialized round-trips, so first-time queue load was N × latency (~1-4s).
  // Each request has an 8s AbortController timeout so a single hung page can't
  // stall the others. For blogs with <400 audio posts, the trailing requests
  // come back empty — Tumblr's public read API is generous enough that the
  // wasted bandwidth (≤20 small JSON 404s) is well worth the latency drop.
  const PAGE = 20;
  const MAX_PAGES = 20; // 400 posts hard cap — generous headroom
  const fetchPage = (offset) => {
    const url = `https://api.tumblr.com/v2/blog/${TUMBLR_BLOG}/posts/audio?api_key=${TUMBLR_API_KEY}&limit=${PAGE}&offset=${offset}`;
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    return fetch(url, { signal: ctrl.signal })
      .then(r => { clearTimeout(t); return r.ok ? r.json() : null; })
      .catch(() => { clearTimeout(t); return null; });
  };
  try {
    const pages = await Promise.all(
      Array.from({ length: MAX_PAGES }, (_, i) => fetchPage(i * PAGE))
    );
    const all = [];
    for (const data of pages) {
      const posts = (data && data.response && data.response.posts) || [];
      if (posts.length) all.push(...posts);
    }
    const parsed = all.map(parseTumblrPost).filter(Boolean);
    // Only cache successful results. Caching empty would lock the queue into
    // "No tracks yet" for the full TTL after any transient failure (iOS Safari
    // ITP, content blocker, network blip, etc.) — better to refetch on reload.
    if (parsed.length > 0) {
      try {
        localStorage.setItem(TUMBLR_CACHE_KEY, JSON.stringify({ fetchedAt: Date.now(), posts: parsed }));
      } catch (e) {}
    } else {
      try { localStorage.removeItem(TUMBLR_CACHE_KEY); } catch (e) {}
    }
    return parsed;
  } catch (e) {
    console.warn('Tumblr fetch failed', e);
    return [];
  }
}

function mergeQueues(live, staticArchive) {
  const seen = new Set();
  const merged = [];
  for (const p of [...live, ...staticArchive]) {
    if (!p || !p.id || seen.has(p.id)) continue;
    seen.add(p.id);
    merged.push(p);
  }
  merged.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  return merged;
}

// ─── Static archive seed ─────────────────────────────────────────────────
// Fresh start — no historical archive. Queue populates from live Tumblr fetch only.
const STATIC_QUEUE = [];

// Runtime queue — mutable; starts as static seed, replaced after live fetch
let queue = STATIC_QUEUE.slice();

let cursor = 0;
let scWidget = null;
let scReady = false;
let scPlaying = false;
let scPendingPlay = false;
const audioFrame = document.getElementById('audioFrame');

const $ = (id) => document.getElementById(id);

function renderPill() {
  if (queue.length === 0) {
    $("pill").dataset.platform = 'empty';
    $("scTitle").textContent = 'No tracks yet — check back soon';
    $("scArt").style.backgroundImage = '';
    audioFrame.src = '';
    if (typeof endLoading === 'function') endLoading();
    return;
  }
  document.querySelectorAll('.queue-row').forEach((row, i) => {
    row.classList.toggle('current', i === cursor);
  });
  loadCurrentEmbed();
}

function buildScUrl(embed) {
  const target = embed.ref_type === 'track_id'
    ? `https://api.soundcloud.com/tracks/${embed.ref}`
    : `https://soundcloud.com/${embed.ref}`;
  const params = new URLSearchParams({
    url: target, auto_play: 'false', visual: 'false',
    color: '2B22F4',
    hide_related: 'true', show_comments: 'false', show_user: 'true',
    show_teaser: 'false', sharing: 'false', buying: 'false',
    download: 'false', show_reposts: 'false', show_playcount: 'false'
  });
  return 'https://w.soundcloud.com/player/?' + params.toString();
}

function buildBcUrl(embed) {
  // Bandcamp EmbeddedPlayer: small (slim strip), transparent so the sky shows through.
  return `https://bandcamp.com/EmbeddedPlayer/${embed.ref_type}=${embed.ref}/size=small/bgcol=ffffff/linkcol=2B22F4/transparent=true/`;
}

function teardownSc() {
  if (scWidget) {
    try { scWidget.pause(); } catch (e) {}
    try {
      scWidget.unbind(SC.Widget.Events.READY);
      scWidget.unbind(SC.Widget.Events.FINISH);
    } catch (e) {}
    scWidget = null;
  }
  scReady = false;
  scPlaying = false;
  scPendingPlay = false;
  $("scPlay").textContent = "▶";
  $("scPlay").setAttribute("aria-label", "Play");
}

function fillScStripFromCaption(post) {
  const links = (post.caption_links || []).slice(0, 2);
  const lineParts = links.map(l =>
    `<a href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`
  );
  $("scTitle").innerHTML = lineParts.join(' · ') || '…';
}

function trackUrlForOembed(embed) {
  return embed.ref_type === 'track_id'
    ? `https://api.soundcloud.com/tracks/${embed.ref}`
    : `https://soundcloud.com/${embed.ref}`;
}

function fetchScOembed(embed) {
  // SoundCloud's oEmbed endpoint is public + CORS-enabled.
  // 5s AbortController timeout — a hung oEmbed call would leave the pill in
  // caption-link-fallback state forever; with the abort, we fall back cleanly.
  const url = `https://soundcloud.com/oembed?format=json&url=${encodeURIComponent(trackUrlForOembed(embed))}`;
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 5000);
  return fetch(url, { signal: ctrl.signal })
    .then(r => { clearTimeout(t); return r.ok ? r.json() : null; })
    .catch(() => { clearTimeout(t); return null; });
}

// Bumped on every loadCurrentEmbed; iframe-load handlers check against this to bail
// when a later track has superseded them. Without it, a slow-loading old iframe's
// onload would fire after the user clicked Next, dismissing the new track's
// loading indicator and/or trying to bind the wrong widget.
let _audioLoadId = 0;

function deferAssignSrc(url, loadId) {
  // Defer iframe src assignment to next paint frame so pill UI shows first
  audioFrame.addEventListener('load', () => {
    if (loadId === _audioLoadId) endLoading();
  }, { once: true });
  requestAnimationFrame(() => { audioFrame.src = url; });
}

function setLoading(state) {
  const pill = $("pill");
  if (!pill) return;
  pill.classList.toggle('loading', !!state);
}

let loadingTimeoutId = null;
function startLoading() {
  setLoading(true);
  if (loadingTimeoutId) clearTimeout(loadingTimeoutId);
  // Fallback: remove loading state after 4s in case onload/READY never fires
  loadingTimeoutId = setTimeout(() => setLoading(false), 4000);
}
function endLoading() {
  setLoading(false);
  if (loadingTimeoutId) { clearTimeout(loadingTimeoutId); loadingTimeoutId = null; }
}

function loadCurrentEmbed() {
  teardownSc();
  const loadId = ++_audioLoadId;
  const post = queue[cursor];
  const embed = post.embeds[0];
  console.log('[bv] track', cursor + 1, 'of', queue.length,
    '· tumblr post', post.id,
    '·', embed.platform, embed.ref_type, embed.ref,
    '·', post.title || (post.caption_links || []).map(l => l.label).join(' / ') || '(no title)');
  $("pill").dataset.platform = embed.platform;
  startLoading();

  if (embed.platform === 'soundcloud') {
    // Immediate caption-link fallback while oEmbed fetches
    fillScStripFromCaption(post);
    $("scArt").style.backgroundImage = '';

    // Authoritative metadata via oEmbed (title, author, thumbnail) — runs in parallel
    fetchScOembed(embed).then(data => {
      if (!data) return;
      const rawTitle = data.title || '';
      const author = data.author_name || '';
      const authorUrl = data.author_url || '';
      const cleanTitle = rawTitle.replace(/\s+by\s+.+$/i, '');
      if (author && authorUrl) {
        $("scTitle").innerHTML =
          `<a href="${authorUrl}" target="_blank" rel="noopener">${cleanTitle}</a> by ${author}`;
      } else {
        $("scTitle").textContent = cleanTitle;
      }
      if (data.thumbnail_url) $("scArt").style.backgroundImage = `url("${data.thumbnail_url}")`;
    });

    // Bind once both the iframe AND SC.Widget API are available (defer-load tolerant)
    let bindAttempts = 0;
    const tryBindSc = () => {
      if ($("pill").dataset.platform !== 'soundcloud') return;
      if (scWidget) return;
      if (typeof SC !== 'undefined' && SC.Widget && audioFrame.src) {
        try {
          scWidget = SC.Widget(audioFrame);
          console.log('[bv] SC.Widget bound to iframe');
          scWidget.bind(SC.Widget.Events.READY, () => {
            scReady = true;
            console.log('[bv] SC READY — track loaded & ready to play');
            endLoading();
            if (scPendingPlay) { scPendingPlay = false; playSc(); }
          });
          scWidget.bind(SC.Widget.Events.FINISH, () => pauseSc());
          if (SC.Widget.Events.ERROR) {
            scWidget.bind(SC.Widget.Events.ERROR, (e) => {
              console.error('[bv] SC ERROR', e);
            });
          }
          return;
        } catch (e) {
          console.warn('[bv] SC bind threw, retrying', e);
        }
      }
      if (++bindAttempts > 80) {
        console.warn('[bv] SC bind gave up after 4s — SC.Widget never became available?',
          { scLoaded: typeof SC, hasWidget: !!(typeof SC !== 'undefined' && SC.Widget), src: audioFrame.src });
        return;
      }
      setTimeout(tryBindSc, 50);
    };
    audioFrame.addEventListener('load', () => {
      if (loadId === _audioLoadId) tryBindSc();
    }, { once: true });
    requestAnimationFrame(() => {
      audioFrame.src = buildScUrl(embed);
      tryBindSc(); // start polling now in case onload races SC's script load
    });
  } else if (embed.platform === 'bandcamp') {
    deferAssignSrc(buildBcUrl(embed), loadId);
  } else {
    audioFrame.src = '';
  }
}

function playSc() {
  // iOS Safari requires play() inside the user-gesture handler. The SC Widget
  // API queues commands until the player is READY, so we don't need to gate
  // on scReady — gating dropped the gesture context and silently failed on iOS.
  if (!scWidget) {
    console.log('[bv] playSc deferred — scWidget not bound yet');
    scPendingPlay = true;
    return;
  }
  console.log('[bv] playSc — calling scWidget.play()');
  try {
    scWidget.play();
    scPlaying = true;
    $("scPlay").textContent = "❚❚";
    $("scPlay").setAttribute("aria-label", "Pause");
  } catch (e) {
    console.error('[bv] scWidget.play() threw', e);
  }
}
function pauseSc() {
  if (scWidget) { try { scWidget.pause(); } catch (e) {} }
  scPlaying = false;
  $("scPlay").textContent = "▶";
  $("scPlay").setAttribute("aria-label", "Play");
}
$("scPlay").addEventListener("click", () => scPlaying ? pauseSc() : playSc());

function renderQueue() {
  const html = queue.map((p, i) => {
    const e = p.embeds[0];
    const links = p.caption_links.slice(0, 2);
    const text =
      p.title ||
      links.map(l => l.label).join(" · ") ||
      e.platform;
    return `
      <div class="queue-row${i===cursor?' current':''}" data-i="${i}" role="option" aria-selected="${i===cursor}">
        <span class="platform-dot ${e.platform}" aria-hidden="true"></span>
        <span class="queue-text">${text}</span>
      </div>`;
  }).join("");
  $("queuePanel").innerHTML = html;
  $("queuePanel").querySelectorAll(".queue-row").forEach(row => {
    row.addEventListener("click", () => {
      cursor = parseInt(row.dataset.i, 10);
      renderPill();
    });
  });
}

$("btnPrev").addEventListener("click", () => {
  if (queue.length === 0) return;
  cursor = (cursor - 1 + queue.length) % queue.length;
  renderPill();
});
$("btnNext").addEventListener("click", () => {
  if (queue.length === 0) return;
  cursor = (cursor + 1) % queue.length;
  renderPill();
});
$("btnList").addEventListener("click", (e) => {
  e.stopPropagation();
  $("queuePanel").classList.toggle("open");
});
document.addEventListener("click", (e) => {
  if (!$("queuePanel").contains(e.target) && e.target !== $("btnList")) {
    $("queuePanel").classList.remove("open");
  }
});

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "A" || e.target.tagName === "INPUT") return;
  if (e.code === "ArrowLeft")  $("btnPrev").click();
  else if (e.code === "ArrowRight") $("btnNext").click();
  else if (e.code === "Escape")     $("queuePanel").classList.remove("open");
});

// Tell the dashboard to skip its intro animation, then force a TOP-LEVEL navigation
// so Wix fully unmounts the void iframe before mounting the dashboard.
const titleLink = document.querySelector('#bluishvoid-nav a');
if (titleLink) {
  titleLink.addEventListener('click', (e) => {
    e.preventDefault();
    try { sessionStorage.setItem('bv_skip_intro', '1'); } catch (err) {}
    const target = titleLink.getAttribute('href') || 'https://bluishvoid.com/';
    try { window.top.location.href = target; }
    catch (err) { window.location.href = target; }
  });
}


// Initial render with static seed so something appears instantly
renderQueue();
renderPill();

// Then fetch live posts; if any, merge in and re-render
fetchLiveTumblrPosts().then(live => {
  if (!live || !live.length) return;
  queue = mergeQueues(live, STATIC_QUEUE);
  cursor = 0;
  renderQueue();
  renderPill();
});

// ─── Background video cycling ────────────────────────────────────────────
// BG_VIDEOS list lives in /bg-videos.js (loaded above) — shared with the main page.

let bgIdx = 0;
const bgVideoEl = document.getElementById('bgVideo');
const bgSourceEl = bgVideoEl.querySelector('source');

// Skip the ~200MB bg video on slow/data-saver connections — page still works fine
// without it (the CSS bg color takes over). Both the initial pick AND the arrow
// controls are gated, so users on cellular don't accidentally trigger a download.
const _bgConn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
const _bgEt = _bgConn && _bgConn.effectiveType;
const _bgSlow = _bgEt === 'slow-2g' || _bgEt === '2g' || _bgEt === '3g' || (_bgConn && _bgConn.saveData);

// Pick a random starting video from BG_VIDEOS so the page stays in sync with R2
// without relying on the hardcoded <source> fallback above (which can drift).
if (BG_VIDEOS.length > 0 && !_bgSlow) {
  bgIdx = Math.floor(Math.random() * BG_VIDEOS.length);
  bgSourceEl.src = BG_VIDEOS[bgIdx];
  bgVideoEl.load();
  bgVideoEl.play().catch(() => {});
}

function setBg(i) {
  if (BG_VIDEOS.length < 1 || _bgSlow) return;
  const n = BG_VIDEOS.length;
  bgIdx = ((i % n) + n) % n;
  bgVideoEl.style.opacity = '0';
  setTimeout(() => {
    bgSourceEl.src = BG_VIDEOS[bgIdx];
    bgVideoEl.load();
    bgVideoEl.play().catch(() => {});
    bgVideoEl.style.opacity = '1';
  }, 300);
}

if (BG_VIDEOS.length > 1 && !_bgSlow) {
  document.getElementById('bgPrev').addEventListener('click', () => setBg(bgIdx - 1));
  document.getElementById('bgNext').addEventListener('click', () => setBg(bgIdx + 1));

  // Reveal arrows on motion, fade after 2s of stillness
  let bgNavTimer = null;
  const revealBgNav = () => {
    document.body.classList.add('bg-nav-visible');
    clearTimeout(bgNavTimer);
    bgNavTimer = setTimeout(() => document.body.classList.remove('bg-nav-visible'), 2000);
  };
  document.addEventListener('mousemove', revealBgNav, { passive: true });
  document.addEventListener('touchstart', revealBgNav, { passive: true });
  revealBgNav(); // brief initial reveal so user knows they exist
}
</script>

</body>
</html>
